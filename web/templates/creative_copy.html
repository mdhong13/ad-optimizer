{% extends "base.html" %}
{% block title %}카피 생성 — OneMessage Ad Optimizer{% endblock %}

{% block head %}
<style>
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .form-row { display: flex; flex-direction: column; gap: 4px; }
  .form-row label { font-size: 11px; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-row input, .form-row select, .form-row textarea {
    background: #0f1117; color: #e2e8f0; border: 1px solid #2d3748; border-radius: 6px;
    padding: 8px 10px; font-size: 13px; font-family: inherit;
  }
  .form-row textarea { min-height: 70px; resize: vertical; }
  .variant-card { background: #0f1117; border: 1px solid #2d3748; border-radius: 6px; padding: 14px; margin-bottom: 12px; }
  .variant-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .lang-block { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; font-size: 13px; line-height: 1.55; }
  .lang-block > div { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 6px; padding: 12px; }
  .lang-tag { font-size: 10px; font-weight: 700; color: #f6ad55; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  .meta-row { font-size: 11px; color: #718096; margin-top: 8px; }
  .copy-btn { background: #2d3748; color: #a0aec0; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .copy-btn:hover { background: #4a5568; color: #e2e8f0; }
  pre.raw { background: #0f1117; border: 1px solid #2d3748; border-radius: 6px; padding: 12px; font-size: 11px; color: #718096; overflow-x: auto; max-height: 260px; }
</style>
{% endblock %}

{% block content %}
<h1>카피 생성</h1>

<div class="card">
  <h2>브리프</h2>
  <div class="form-grid">
    <div class="form-row">
      <label>Provider / Model</label>
      <select id="provider_id">
        {% for p in providers %}
          <option value="{{ p.id }}" {% if p.id == default_provider %}selected{% endif %}>{{ p.label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-row">
      <label>Campaign</label>
      <input id="campaign" type="text" value="kr_reassurance_v1" list="campaign_list">
      <datalist id="campaign_list">
        <option value="kr_reassurance_v1">
        <option value="us_crypto_v1">
        <option value="us_family_safety">
        <option value="us_digital_legacy">
      </datalist>
    </div>
    <div class="form-row">
      <label>Angle</label>
      <select id="angle">
        <option value="any">any</option>
        <option value="crypto_inheritance">crypto_inheritance</option>
        <option value="family_safety">family_safety</option>
        <option value="emergency_ready">emergency_ready</option>
        <option value="digital_legacy">digital_legacy</option>
      </select>
    </div>
    <div class="form-row">
      <label>Platform</label>
      <select id="platform">
        <option value="meta_feed">meta_feed</option>
        <option value="meta_reels">meta_reels</option>
        <option value="google_search">google_search</option>
        <option value="google_display">google_display</option>
        <option value="x_promoted">x_promoted</option>
        <option value="reddit_promoted">reddit_promoted</option>
      </select>
    </div>
    <div class="form-row">
      <label>Tone</label>
      <select id="tone">
        <option value="reassurance">reassurance (KR 안심)</option>
        <option value="blunt_crypto">blunt_crypto (US)</option>
        <option value="urgent">urgent</option>
        <option value="humble_practical">humble_practical</option>
      </select>
    </div>
    <div class="form-row">
      <label>Audience</label>
      <input id="audience" type="text" placeholder="e.g. 40-60대 한국 가장 / US crypto holders">
    </div>
    <div class="form-row">
      <label>Variants</label>
      <input id="n_variants" type="number" min="1" max="8" value="3">
    </div>
  </div>
  <div class="form-row" style="margin-top:14px;">
    <label>Extra instructions (선택)</label>
    <textarea id="extra" placeholder="예: FTX 사태 angle 강조, 숫자앵커는 12시간 우선"></textarea>
  </div>
  <div style="margin-top:16px; display:flex; gap:10px; align-items:center;">
    <button class="btn btn-blue" id="gen-btn" onclick="generateCopy()">카피 생성</button>
    <span id="status" style="font-size:12px; color:#718096;"></span>
  </div>
</div>

<div id="results" style="display:none;">
  <div class="card">
    <h2>결과 <span id="meta-label" style="font-weight:400; color:#718096; font-size:12px;"></span></h2>
    <div id="variants"></div>
  </div>
  <div class="card">
    <h2>Raw JSON</h2>
    <pre class="raw" id="raw-json"></pre>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function v(id) { return document.getElementById(id).value; }
function setStatus(msg, color) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.style.color = color || "#718096";
}

async function generateCopy() {
  const brief = {
    campaign: v("campaign"),
    angle: v("angle"),
    platform: v("platform"),
    tone: v("tone"),
    audience: v("audience"),
    n_variants: parseInt(v("n_variants"), 10) || 3,
    extra_instructions: v("extra"),
  };
  const payload = { brief, provider_id: v("provider_id") };
  const btn = document.getElementById("gen-btn");
  btn.disabled = true;
  setStatus("생성 중… (보통 10~30초)", "#63b3ed");
  try {
    const r = await fetch("/creative/copy/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) {
      setStatus("에러: " + (data.detail || r.statusText), "#fc8181");
      return;
    }
    renderResults(data);
    setStatus("완료", "#68d391");
  } catch (e) {
    setStatus("네트워크 에러: " + e.message, "#fc8181");
  } finally {
    btn.disabled = false;
  }
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c]);
}

function renderResults(data) {
  document.getElementById("results").style.display = "block";
  const meta = data._meta || {};
  document.getElementById("meta-label").textContent = `— ${meta.provider || ""} / ${meta.model || ""}`;
  document.getElementById("raw-json").textContent = JSON.stringify(data, null, 2);

  const variants = data.variants || [];
  const box = document.getElementById("variants");
  if (!variants.length) { box.innerHTML = '<div class="empty">variants 없음</div>'; return; }

  box.innerHTML = variants.map((v, i) => {
    const ko = v.ko || {};
    const en = v.en || {};
    const hyp = v.hypothesis || v.angle || "";
    const anchor = v.number_anchor || "";
    return `
      <div class="variant-card">
        <div class="variant-head">
          <strong>Variant ${i + 1}</strong>
          <button class="copy-btn" onclick='copyVariant(${i})'>복사</button>
        </div>
        <div class="lang-block">
          <div>
            <div class="lang-tag">🇰🇷 KO</div>
            <div><strong>${esc(ko.headline || "")}</strong></div>
            <div style="margin-top:6px;">${esc(ko.body || "")}</div>
            ${ko.cta ? `<div style="margin-top:6px; color:#68d391;">CTA: ${esc(ko.cta)}</div>` : ""}
          </div>
          <div>
            <div class="lang-tag">🇬🇧 EN</div>
            <div><strong>${esc(en.headline || "")}</strong></div>
            <div style="margin-top:6px;">${esc(en.body || "")}</div>
            ${en.cta ? `<div style="margin-top:6px; color:#68d391;">CTA: ${esc(en.cta)}</div>` : ""}
          </div>
        </div>
        <div class="meta-row">
          ${hyp ? `가설: <strong>${esc(hyp)}</strong>` : ""}
          ${anchor ? ` · 앵커: <strong>${esc(anchor)}</strong>` : ""}
        </div>
      </div>
    `;
  }).join("");

  window._variants = variants;
}

function copyVariant(i) {
  const v = (window._variants || [])[i];
  if (!v) return;
  const text = JSON.stringify(v, null, 2);
  navigator.clipboard.writeText(text).then(() => setStatus(`Variant ${i+1} 복사됨`, "#68d391"));
}
</script>
{% endblock %}
