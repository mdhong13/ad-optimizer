<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OneMessage Ad Optimizer{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#1a1f2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; }
    a { color: #63b3ed; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav { background: #1a1f2e; border-bottom: 1px solid #2d3748; padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 24px; }
    nav .brand { font-weight: 700; font-size: 16px; color: #f6ad55; }
    nav .brand span { color: #68d391; }
    nav a { color: #a0aec0; font-size: 14px; padding: 4px 8px; border-radius: 4px; }
    nav a:hover, nav a.active { color: #e2e8f0; background: #2d3748; text-decoration: none; }

    /* Layout */
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Cards */
    .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 8px; padding: 16px; }
    .stat .label { font-size: 12px; color: #718096; margin-bottom: 6px; }
    .stat .value { font-size: 24px; font-weight: 700; color: #e2e8f0; }
    .stat .sub { font-size: 11px; color: #4a5568; margin-top: 2px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #2d3748; color: #718096; font-weight: 500; font-size: 11px; text-transform: uppercase; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e2435; }
    tr:hover td { background: #1e2435; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #1a3a2a; color: #68d391; }
    .badge-yellow { background: #3a2f1a; color: #f6ad55; }
    .badge-red { background: #3a1a1a; color: #fc8181; }
    .badge-blue { background: #1a2a3a; color: #63b3ed; }
    .badge-gray { background: #2d3748; color: #a0aec0; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-green { background: #276749; color: #c6f6d5; }
    .btn-red { background: #742a2a; color: #fed7d7; }
    .btn-blue { background: #2b4c7e; color: #bee3f8; }
    .btn-gray { background: #2d3748; color: #a0aec0; }

    /* Event severity colors */
    .sev-critical { color: #fc8181; }
    .sev-high { color: #f6ad55; }
    .sev-medium { color: #63b3ed; }
    .sev-low { color: #68d391; }

    /* Empty state */
    .empty { text-align: center; color: #4a5568; padding: 40px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="brand">One<span>Message</span> Optimizer</span>
    <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>대시보드</a>
    <a href="/campaigns" {% if '/campaigns' in request.url.path %}class="active"{% endif %}>캠페인</a>
    <a href="/viral" {% if '/viral' in request.url.path %}class="active"{% endif %}>바이럴</a>
    <a href="/publisher" {% if '/publisher' in request.url.path %}class="active"{% endif %}>배포</a>
    <a href="/events" {% if '/events' in request.url.path %}class="active"{% endif %}>시장</a>
    <a href="/decisions" {% if '/decisions' in request.url.path %}class="active"{% endif %}>결정</a>
    <a href="/scheduler" {% if '/scheduler' in request.url.path %}class="active"{% endif %}>스케줄러</a>
    <a href="/settings" {% if '/settings' in request.url.path %}class="active"{% endif %}>설정</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
